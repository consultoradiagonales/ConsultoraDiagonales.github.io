<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consultora Diagonales</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">

<style>
body{font-family:'Inter',sans-serif;background:#f5f7fb}
.glass{background:rgba(255,255,255,.7);backdrop-filter:blur(16px)}
.premium-button{background:linear-gradient(to right,#06b6d4,#1d4ed8)}
</style>
</head>

<body>

<!-- NAVBAR -->
<header class="sticky top-0 glass border-b p-4 flex justify-between">
  <div class="flex items-center gap-3">
    <img src="assets/img/cerebro-rey.svg" class="w-8">
    <b>DIAGONALES</b>
  </div>

  <nav class="flex gap-6 text-sm">
    <a href="observatorio/index.html">Observatorio</a>
    <a href="#">Radiografías</a>
    <a href="#">Nosotros</a>
  </nav>
</header>

<!-- HERO -->
<section class="py-24 text-center">
  <h1 class="text-5xl font-black">
    Inteligencia Política
  </h1>
  <p class="text-gray-500 mt-4">
    Comprender antes para anticipar mejor
  </p>
</section>

<!-- CAJA TEST -->
<section class="pb-16">
<div class="max-w-4xl mx-auto px-6">

<div class="glass p-6 rounded-2xl flex items-center gap-6 shadow">

<img src="assets/img/cerebro-rey.svg" class="w-14">

<div class="flex-1">
<p class="text-xs text-cyan-600 font-bold uppercase">Evaluación Estratégica</p>
<h3 class="font-bold">Test de Inteligencia Emocional</h3>
</div>

<button onclick="abrirModal()" class="premium-button text-white px-5 py-2 rounded">
Realizar Test
</button>

</div>

</div>
</section>

<!-- RADIOGRAFIAS -->
<section class="py-16 max-w-6xl mx-auto px-6">
<h2 class="text-3xl font-black mb-8">Radiografías</h2>

<div class="grid md:grid-cols-3 gap-6">

<div class="bg-white p-6 rounded shadow">
<b>La Plata</b>
<p class="text-sm text-gray-500">Pública</p>
</div>

<div class="bg-white p-6 rounded shadow">
<b>Córdoba</b>
<p class="text-sm text-yellow-500">Premium</p>
</div>

<div class="bg-white p-6 rounded shadow">
<b>Rosario</b>
<a href="https://wa.me/5492210000000" class="text-blue-600">Solicitar</a>
</div>

</div>
</section>

<!-- MODAL -->
<div id="modal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center">

<div class="bg-white p-6 rounded-xl w-[90%] max-w-md">

<h2 class="font-bold mb-4">Evaluación</h2>

<input id="nombre" placeholder="Nombre" class="w-full border p-2 mb-2">
<input id="email" placeholder="Email" class="w-full border p-2 mb-2">

<button onclick="enviar()" class="premium-button text-white w-full p-2 rounded">
Continuar
</button>

</div>

</div>

<script>
function abrirModal(){
document.getElementById("modal").classList.remove("hidden")
}

function enviar(){
let nombre=document.getElementById("nombre").value

let url="https://wa.me/5492210000000?text="+encodeURIComponent(
"Quiero hacer el test\nNombre: "+nombre
)

window.open(url)
}
</script>

</body>
</html>
