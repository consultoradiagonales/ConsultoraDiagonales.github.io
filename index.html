<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Consultora Diagonales</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Inter',sans-serif;
  background:#f5f7fb;
  color:#081120;
}

.glass{
  background:rgba(255,255,255,0.75);
  backdrop-filter:blur(18px);
}

.gradient-text{
  background:linear-gradient(to right,#06b6d4,#1d4ed8);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.premium-button{
  background:linear-gradient(to right,#06b6d4,#1d4ed8);
  transition:0.3s;
}

.premium-button:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 25px rgba(0,0,0,0.15);
}
</style>
</head>

<body>

<!-- NAVBAR -->
<header class="sticky top-0 z-50 glass border-b border-white/30">
  <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">

    <div class="flex items-center gap-3">
      <img src="assets/img/logo.png" class="w-10">
      <span class="font-black text-lg">DIAGONALES</span>
    </div>

    <nav class="flex gap-8 text-sm font-semibold text-slate-600">
      <a href="observatorio/index.html" class="hover:text-cyan-600">Observatorio</a>
      <a href="#" class="hover:text-cyan-600">Radiografías</a>
      <a href="#" class="hover:text-cyan-600">Nosotros</a>
    </nav>

  </div>
</header>

<!-- HERO -->
<section class="pt-28 pb-20 text-center">
  <div class="max-w-5xl mx-auto px-6">

    <h1 class="text-6xl font-black leading-tight mb-6">
      Inteligencia Política
    </h1>

    <p class="text-xl text-slate-500">
      Comprender antes para anticipar mejor
    </p>

  </div>
</section>

<!-- CAJA ESTRATEGICA -->
<section class="pb-20">
  <div class="max-w-5xl mx-auto px-6">

    <div class="glass border border-white/40 rounded-3xl px-8 py-6 shadow-xl flex items-center justify-between">

      <div class="flex items-center gap-5">

        <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-cyan-400 to-blue-700 flex items-center justify-center shadow">
          <img src="assets/img/cerebro-rey.svg" class="w-10">
        </div>

        <div>
          <p class="uppercase text-xs text-cyan-700 font-bold tracking-widest">
            Evaluación Estratégica
          </p>

          <h3 class="font-bold text-lg">
            Test de Inteligencia Emocional y Estratégica
          </h3>
        </div>

      </div>

      <button onclick="abrirModal()" class="premium-button text-white px-6 py-3 rounded-xl font-semibold">
        Realizar Test
      </button>

    </div>

  </div>
</section>

<!-- RADIOGRAFIAS -->
<section class="py-16">
  <div class="max-w-6xl mx-auto px-6">

    <h2 class="text-4xl font-black mb-10">
      Radiografías
    </h2>

    <div class="grid md:grid-cols-3 gap-8">

      <div class="bg-white p-6 rounded-2xl shadow hover:-translate-y-1 transition">
        <h3 class="font-bold text-xl mb-2">La Plata</h3>
        <span class="text-green-600 text-sm font-semibold">Pública</span>
      </div>

      <div class="bg-white p-6 rounded-2xl shadow hover:-translate-y-1 transition">
        <h3 class="font-bold text-xl mb-2">Córdoba</h3>
        <span class="text-yellow-500 text-sm font-semibold">Premium</span>
      </div>

      <div class="bg-white p-6 rounded-2xl shadow hover:-translate-y-1 transition">
        <h3 class="font-bold text-xl mb-2">Rosario</h3>
        <a href="https://wa.me/5492210000000" class="text-cyan-600 font-bold text-sm">
          Solicitar
        </a>
      </div>

    </div>

  </div>
</section>

<!-- MODAL -->
<div id="modal" class="hidden fixed inset-0 bg-black/40 backdrop-blur flex items-center justify-center z-50">

  <div class="bg-white rounded-2xl p-8 w-full max-w-md shadow-2xl">

    <h2 class="text-2xl font-black mb-6">
      Evaluación Estratégica
    </h2>

    <input id="nombre" placeholder="Nombre" class="w-full border p-3 rounded-xl mb-3">
    <input id="email" placeholder="Email" class="w-full border p-3 rounded-xl mb-3">

    <button onclick="enviar()" class="premium-button w-full text-white py-3 rounded-xl font-semibold">
      Continuar
    </button>

  </div>

</div>

<script>

function abrirModal(){
  document.getElementById("modal").classList.remove("hidden");
}

function enviar(){

  const nombre = document.getElementById("nombre").value;

  const mensaje = `Hola, quiero hacer el test.
Nombre: ${nombre}`;

  const url = "https://wa.me/5492210000000?text=" + encodeURIComponent(mensaje);

  window.open(url, "_blank");
}

</script>

</body>
</html>
